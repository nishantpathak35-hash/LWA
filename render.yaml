services:
  # WhatsApp HTTP API (WAHA) service
  - type: web
    name: waha
    env: docker
    dockerImage: devlikeapro/waha:latest
    plan: starter
    ports:
      - port: 3000
        protocol: http
    envVars:
      - key: WAHA_API_KEY
        sync: false
      - key: WAHA_PRINT_QR
        value: "true"
