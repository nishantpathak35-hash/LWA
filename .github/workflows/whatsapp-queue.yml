name: WhatsApp Queue Processor

on:
  schedule:
    # Runs every 5 minutes (GitHub Actions minimum is 5 min)
    - cron: '*/5 * * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Process WhatsApp message queue
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node scripts/process-whatsapp-queue.js
